version: '3.8'

services:
  ml_service:
    build:
      context: ./ml_service
    container_name: disease_pred_ml
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PORT=5000

  backend:
    build:
      context: ./backend
    container_name: disease_pred_backend
    ports:
      - "3000:3000"
    depends_on:
      - ml_service
    restart: unless-stopped
    environment:
      - PORT=3000
      - ML_SERVICE_URL=http://ml_service:5000
    volumes:
      - ./backend/database.sqlite:/usr/src/app/database.sqlite

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:3000/api
    container_name: disease_pred_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
